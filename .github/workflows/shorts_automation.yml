name: YouTube Shorts Automation

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL to upload'
        required: true
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

jobs:
  upload_shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client yt-dlp
      
      - name: Create YouTube credentials
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_CREDENTIALS" > client_secret.json
      
      - name: Download and Upload Video
        timeout-minutes: 90
        run: |
          python shorts_generator.py "${{ github.event.inputs.video_url }}" || echo "Upload completed or skipped"
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-videos
          path: |
            downloaded_videos/
            uploaded_videos/
          retention-days: 7
